<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f4f6f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:420px;
    height:700px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
    display:flex;
    flex-direction:column;
}

.header{
    background:#ff6b35;
    color:white;
    padding:20px;
    font-size:22px;
    font-weight:600;
}

.status{
    font-size:12px;
    opacity:0.8;
    margin-top:5px;
}

.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#fafafa;
}

.message{
    max-width:75%;
    padding:12px 16px;
    border-radius:16px;
    word-wrap:break-word;
}

.user{
    align-self:flex-end;
    background:#ff6b35;
    color:white;
}

.bot{
    align-self:flex-start;
    background:#e9ecef;
    color:#333;
}

.input-area{
    display:flex;
    padding:15px;
    border-top:1px solid #eee;
    background:white;
}

input{
    flex:1;
    border:none;
    background:#f1f3f5;
    border-radius:12px;
    padding:12px;
    font-size:15px;
    outline:none;
}

button{
    margin-left:10px;
    border:none;
    background:#ff6b35;
    color:white;
    border-radius:12px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        🛍 Shopping Assistant
        <div class="status">Online</div>
    </div>

    <div id="chatBox" class="chat-box">

        <div class="message bot">
            Hello! How can I help you today?<br><br>
            Try:
            <br>• track 1001
            <br>• cancel 1001
            <br>• tell me about iphone 17
            <br>• help
        </div>

    </div>

    <div class="input-area">
        <input
            id="msg"
            placeholder="Type your message..."
            onkeypress="if(event.key==='Enter') sendMessage()"
        >

        <button onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<script>

async function sendMessage(){

    let input=document.getElementById("msg");
    let message=input.value.trim();

    if(message==="") return;

    let chat=document.getElementById("chatBox");

    chat.innerHTML += `
        <div class="message user">
            ${message}
        </div>
    `;

    input.value="";

    try{

        let response=await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:message
            })
        });

        let data=await response.json();

        chat.innerHTML += `
            <div class="message bot">
                ${data.reply}
            </div>
        `;

        chat.scrollTop=chat.scrollHeight;

    }
    catch(error){

        chat.innerHTML += `
            <div class="message bot">
                Unable to connect to server.
            </div>
        `;
    }
}
</script>

</body>
</html>
